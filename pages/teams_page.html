<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../plugins/bootstrap/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script src="../plugins/bootstrap/js/bootstrap.bundle.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <title>Teams | Photogrem</title>
  </head>

  <body>
    <div class="app min-vh-100 w-100">
      <!-- Header -->
      <header
        class="app-header d-flex align-items-center justify-content-between px-3"
      >
        <div>
          <img src="../assets/svgs/app_logo.svg" alt="Photogrem" />
        </div>

        <a class="btn rounded-circle" href="../index.html" id="back-btn">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </header>

      <!-- Team Members Section -->
      <div
        class="container app-body d-flex flex-column align-items-center justify-content-center"
      >
        <div class="row">
          <div
            class="col-md-12 d-flex align-items-center justify-content-center"
          >
            <div
              class="container-team-card d-flex justify-content-center flex-wrap gap-4"
            >
              <div
                class="card shadow-sm p-3 d-flex flex-row align-items-center min-h-120px min-w-330px max-w-330px"
              >
                <div class="picture-container">
                  <img src="../assets/images/shiv.jpg" class="member-pic" />
                </div>
                <div>
                  <h5 class="mb-0">Shivaranjan Menon Kodharamath</h5>
                  <p class="text-muted">M-GEO, Geoinformatics</p>
                </div>
              </div>

              <div
                class="card shadow-sm p-3 d-flex flex-row align-items-center min-h-120px min-w-330px max-w-330px"
              >
                <div class="picture-container hashir">
                  <img src="../assets/images/hashir.jpg" class="member-pic" />
                </div>

                <div>
                  <h5 class="mb-0">Hashir Baig</h5>
                  <p class="text-muted">M-GEO, Geoinformatics</p>
                </div>
              </div>

              <div
                class="card shadow-sm p-3 d-flex flex-row align-items-center min-h-120px min-w-330px max-w-330px"
              >
                <div class="picture-container chameli">
                  <img src="../assets/images/chameli.jpg" class="member-pic" />
                </div>
                <div>
                  <h5 class="mb-0">Chameli Ramesh</h5>
                  <p class="text-muted">M-GEO, Geoinformatics</p>
                </div>
              </div>

              <div
                class="card shadow-sm p-3 d-flex flex-row align-items-center min-h-120px min-w-330px max-w-330px"
              >
                <div class="picture-container">
                  <img src="../assets/images/naresh1.jpg" class="member-pic" />
                </div>
                <div>
                  <h5 class="mb-0">Raja Venkata Sai Naresh Adabala</h5>
                  <p class="text-muted">M-GEO, Geoinformatics</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
