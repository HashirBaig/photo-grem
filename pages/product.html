<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../plugins/bootstrap/css/bootstrap.min.css" />
    <!-- <link
      rel="stylesheet"
      href="https://gisedu.itc.utwente.nl/exercise/libraries/openlayers/v4.6.4/ol.css"
    /> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <script src="../plugins/bootstrap/js/bootstrap.bundle.js"></script>
    <!-- <script src="https://gisedu.itc.utwente.nl/exercise/libraries/openlayers/v4.6.4/ol.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="../plugins/georaster/georaster.js"></script>
    <script src="../plugins/georaster-layer-for-leaflet/georaster-layer-for-leaflet.min.js"></script>

    <script src="../plugins/rainbowvis/rainbowvis.js"></script>
    <script type="module" src="../js/firbase/register.js" defer></script>

    <title>Product | Photogrem</title>
  </head>
  <body>
    <div id="root" class="app min-vh-100 w-100">
      <!-- Header -->
      <header
        class="app-header d-flex align-items-center justify-content-between"
      >
        <div>
          <a href="../index.html">
            <img src="../assets/svgs/app_logo.svg" alt="Photogrem" />
          </a>
        </div>

        <div class="d-none d-md-flex gap-md-2">
          <a
            class="btn btn-primary fw-bold"
            href="../pages/teams_page.html"
            id="nav-to-teams-btn"
          >
            <i class="fa-solid fa-users"></i>
            Team
          </a>

          <a
            class="btn btn-primary fw-bold"
            href="../pages/3D_viz.html"
            id="nav-to-3D-btn"
          >
            <i class="fa-solid fa-cube"></i>
            DSM Viewer
          </a>

          <a
            class="btn btn-primary fw-bold"
            href="../pages/product.html"
            id="nav-to-product-btn"
          >
            <i class="fa-solid fa-map-location-dot"></i>
            Products
          </a>

          <a
            class="btn btn-primary fw-bold"
            href="../pages/workflow.html"
            id="nav-to-workflow-btn"
          >
            <i class="fa-solid fa-briefcase"></i>
            Workflow
          </a>

          <a
            class="btn btn-primary fw-bold"
            href="../pages/faq.html"
            id="nav-to-faq-btn"
          >
            <i class="fa-solid fa-question"></i>
            FAQs
          </a>
        </div>
      </header>

      <!-- app body -->
      <div class="container-fluid">
        <div class="row">
          <div
            class="col-md-12 d-flex align-items-center justify-content-center"
          >
            <div id="map"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/controllers/product.js"></script>
    <script src="../js/helper.js"></script>
  </body>
</html>
